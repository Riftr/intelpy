name: Dependency Hygiene

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run dependency hygiene check
        run: |
          python buildscripts/check_dependency_hygiene.py

      - name: Run existing tests
        run: |
          python tests/test-logrotate.py

      - name: Run headless startup smoke test
        run: |
          set +e
          QT_QPA_PLATFORM=offscreen timeout 15s python intelpy.py
          status=$?
          set -e
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            exit "$status"
          fi



